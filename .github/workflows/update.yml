name: Update News Site

on:
  schedule:
    - cron: '0 0 * * *'    # KST 09:00 — 장 시작 전 분석
    - cron: '0 7 * * *'    # KST 16:00 — 장 마감 후 내일 예측
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Build site
        shell: pwsh
        run: pwsh scripts/build.ps1

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "auto: update $(date +'%Y-%m-%d %H:%M') KST"
          git push
